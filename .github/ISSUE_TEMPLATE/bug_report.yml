name: 🐞 Bug report
description: Report a problem with CodeGrid
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For security issues, **do not** use this form —
        see [SECURITY.md](https://github.com/ZipLyne-Agency/CodeGrid-Claude-Code-Terminal/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open CodeGrid
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CodeGrid version
      placeholder: e.g. 0.1.30
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version & chip
      placeholder: e.g. macOS 15.4, Apple M3
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant output or screenshots. Please redact anything sensitive.
